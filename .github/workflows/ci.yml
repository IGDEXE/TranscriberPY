name: CI (real test)

on:
  push:
  pull_request:

jobs:
  real-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download small sample video
        run: |
          wget -O sample.mp4 https://filesamples.com/samples/video/mp4/sample_640x360.mp4

      - name: Run real transcription test (lightweight)
        run: |
          python transcriber.py sample.mp4 \
            --model tiny \
            --chunk-minutes 1 \
            --no-parallel

      - name: Validate output file
        run: |
          test -f sample_transcript.txt
          test -s sample_transcript.txt