name: CI + Veracode

on:
  push:
  pull_request:

jobs:
  # -----------------------------
  # 📦 PACKAGE PARA VERACODE
  # -----------------------------
  veracode-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar pacote de scan da Veracode
        run: |
          zip -r veracode-scan.zip . \
            -i '*.py' '*.txt' '*.json' \
            -x '*/.git/*' '*/__pycache__/*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: veracode-scan-package
          path: veracode-scan.zip
          if-no-files-found: error

  # -----------------------------
  # 🔎 SCA
  # -----------------------------
  veracode-sca:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Veracode SCA
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SCA }}
        run: |
          curl -sSL https://download.sourceclear.com/ci.sh | bash -s -- scan --update-advisor --allow-dirty

  # -----------------------------
  # ☁️ UPLOAD + SCAN
  # -----------------------------
  veracode-upload-and-scan:
    runs-on: ubuntu-latest
    needs: veracode-package

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: veracode-scan-package

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Upload and scan
        uses: veracode/veracode-uploadandscan-action@0.2.11
        with:
          vid: ${{ secrets.VERACODE_ID }}
          vkey: ${{ secrets.VERACODE_KEY }}
          appname: ${{ github.repository }}
          createprofile: true
          filepath: veracode-scan.zip
          version: ${{ github.run_id }}

  # -----------------------------
  # ⚡ PIPELINE SCAN
  # -----------------------------
  veracode-pipeline-scan:
    runs-on: ubuntu-latest
    needs: veracode-package

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: veracode-scan-package

      - name: Run pipeline scan
        uses: veracode/Veracode-pipeline-scan-action@v1.0.20
        with:
          vid: ${{ secrets.VERACODE_ID }}
          vkey: ${{ secrets.VERACODE_KEY }}
          file: veracode-scan.zip
          issue_details: true
          #fail_build: true

  # -----------------------------
  # 🎧 SEU TESTE (DEPENDENTE)
  # -----------------------------
  transcriber-test:
    runs-on: ubuntu-latest
    needs:
      - veracode-pipeline-scan
      - veracode-upload-and-scan
      - veracode-sca

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak

      - name: Fix build tooling
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<80" wheel

      - name: Install Python dependencies
        run: |
          pip install --no-build-isolation -r requirements.txt

      - name: Generate speech audio
        run: |
          espeak -s 140 -v en "This is a test transcription from github actions pipeline" -w speech.wav

      - name: Create sample video
        run: |
          ffmpeg -f lavfi -i testsrc=duration=8:size=640x360:rate=30 \
                 -i speech.wav \
                 -c:v libx264 -c:a aac -shortest sample.mp4

      - name: Run transcription
        run: |
          python transcriber.py sample.mp4 \
            --model base \
            --chunk-minutes 1 \
            --no-parallel

      - name: Validate output
        run: |
          test -f sample_transcript.txt
          [ $(wc -c < sample_transcript.txt) -gt 5 ]